<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Producción TMC</title>
    <link rel="stylesheet" href="estilos.css">

<body>
    <!-- SOLID MINIMALIST SPLASH V4 -->
    <div id="global-loader" style="display: flex;">
        <div class="logo-crop-container">
            <video id="splash-video" class="splash-media" autoplay muted playsinline loop>
                <source src="Presentacion_tablero.mp4" type="video/mp4">
            </video>
        </div>
        <div class="loader-content">
            <div class="api-spinner" style="display: none;"></div>
            <div class="loader-text">INICIANDO...</div>
        </div>
    </div>

    <!-- CUSTOM MODAL COMPONENT -->
    <div id="app-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header" id="modal-title"></div>
            <div class="modal-body" id="modal-content"></div>
            <div class="modal-footer" id="modal-actions"></div>
        </div>
    </div>

    <header class="main-header">
        <div class="header-content">
            <!-- LOGO & TITLE -->
            <div class="header-brand">
                <img src="logo_tmc.png" alt="TMC Logo" class="brand-logo">
                <h1 class="brand-title">Tablero de Producción</h1>
            </div>

            <!-- TABS & NAVIGATION -->
            <nav class="header-tabs">
                <button id="tab-planificador" class="tab-btn" onclick="switchTab('planificador')">📅
                    Planificador</button>
                <button id="tab-pedidos" class="tab-btn" onclick="switchTab('pedidos')">Pedidos Pendientes <span
                        id="count-pedidos">(0)</span></button>

                <!-- STOCK DROPDOWN -->
                <div class="stock-dropdown">
                    <button id="stock-dropdown-btn" class="tab-btn dropdown-trigger"
                        onclick="toggleStockDropdown(event)">
                        📦 Grupos de Stock <span id="active-group-label"
                            style="margin-left:5px; font-weight:normal; opacity:0.8;"></span> ▾
                    </button>
                    <div id="stock-dropdown-menu" class="dropdown-menu">
                        <div class="dropdown-search-wrapper" style="padding: 10px; border-bottom: 1px solid #eee;">
                            <input type="text" id="dropdown-stock-search" placeholder="🔍 Buscar grupo..."
                                onkeyup="filterStockDropdown(this.value)"
                                style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem;">
                        </div>
                        <div id="dynamic-stock-tabs" class="dropdown-list"></div>
                    </div>
                </div>
            </nav>

            <!-- ACTIONS -->
            <div class="header-actions" style="display:flex; align-items:center; gap:10px;">
                <button onclick="openActivityHistoryModal()" class="tab-btn" style="padding: 6px 12px; font-size: 0.9rem; cursor: pointer; border-radius: 6px; border: 1px solid #dadce0; background: white;" title="Ver historial de actividad">📜 Historial</button>
                <div id="cloud-sync-status" class="cloud-sync-indicator" title="Sincronizado con la nube">☁️</div>
                <button class="refresh-btn" onclick="location.reload()" title="Actualizar Todo">🔄</button>
            </div>
        </div>
    </header>

    <!-- CONFIG MODAL -->
    <div id="configModal" class="modal-overlay">
        <div class="modal">
            <h3>Configurar Columnas</h3>
            <div id="colList" class="col-list">
                <!-- Dynamically populated -->
            </div>
            <div class="modal-actions">
                <button onclick="closeConfig()">Cerrar</button>
            </div>
        </div>
    </div>



    <div class="container">
        <!-- Loading Overlay -->
        <div id="loading" class="loading-overlay" style="display:none;">
            <div class="spinner"></div>
            <div class="loading-text">Cargando datos...</div>
        </div>

        <div id="error" class="error-msg" style="display:none;"></div>

        <!-- CONTEXT MENU CONTAINER -->
        <div id="context-menu"
            style="position: absolute; background: white; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); border-radius: 4px; z-index: 10000; display: none; min-width: 150px;">
        </div>

        <!-- TAB 1: PEDIDOS -->
        <div id="view-pedidos" class="table-view active">
            <!-- Top Bar: Summary + Controls -->
            <div
                style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; flex-wrap:wrap; gap:10px;">
                <!-- SUMMARY BOX + REFRESH (Left) -->
                <div style="display:flex; align-items:center; gap:10px; flex-grow:1;">
                    <div id="summary-pedidos" class="info-bar" style="display:none; margin:0;"></div>
                    <div style="display:flex; align-items:center;">
                        <button class="btn-icon" onclick="loadPedidos()" title="Actualizar Pedidos"
                            style="cursor:pointer; font-size:1.4em; margin-right:5px;">
                            🔄
                        </button>
                        <span id="pedidos-last-update" style="font-size:0.75em; color:#ccc; font-style:italic;"></span>
                    </div>

                </div>

                <!-- CONTROLS (Right) -->
                <div class="controls" style="display:flex; gap:15px; align-items:center;">
                    <!-- STATUS FILTERS -->
                    <div
                        style="display:flex; gap:10px; font-size:0.9em; background:#fff; padding:5px 10px; border-radius:6px; border:1px solid #eee;">
                        <label><input type="radio" name="filter-ped-status" value="all" checked
                                onchange="applyFilters()"> Todos</label>
                        <label><input type="radio" name="filter-ped-status" value="pending" onchange="applyFilters()">
                            ⚠️ Sin Agendar</label>
                        <label><input type="radio" name="filter-ped-status" value="scheduled" onchange="applyFilters()">
                            📅 Agendados</label>
                    </div>

                    <input type="text" id="searchInput-pedidos" class="local-search" placeholder="🔍 Buscar pedidos..."
                        onkeyup="applyFilters()" style="padding-left:10px;">
                </div>
            </div>

            <table id="table-pedidos">
                <thead id="head-pedidos">
                    <!-- Dynamically populated headers -->
                </thead>
                <tbody id="body-pedidos"></tbody>
            </table>
        </div>

        <!-- TAB 2: STOCK -->
        <div id="view-stock" class="table-view">
            <!-- Controls for Stock -->
            <div class="controls" style="margin-bottom: 10px; display:flex; gap:10px; align-items:center;">
                <input type="text" id="searchInput-stock" class="local-search" placeholder="Buscar stock..."
                    onkeyup="applyFilters()">
                <label id="lblHideZero"
                    style="display:flex; align-items:center; gap:5px; font-size:0.85em; cursor:pointer;">
                    <input type="checkbox" id="chkHideZero" onchange="applyFilters()"> Ocultar Mínimo 0
                </label>
            </div>
            <div id="summary-stock" class="info-bar" style="display:none;"></div>
            <table id="table-stock">
                <thead>
                    <tr>
                        <th onclick="sortStock(0)" data-base-label="SKU">SKU</th>
                        <th onclick="sortStock(1)" style="min-width: 250px;" data-base-label="Descripcion">Descripcion
                        </th>
                        <th onclick="sortStock(2)" style="text-align: center;" data-base-label="Stock Real">Stock Real
                        </th>
                        <th onclick="sortStock(3)" style="text-align: center;" data-base-label="Minimo">Minimo</th>
                        <th onclick="sortStock(4)" style="text-align: center;" data-base-label="Faltante">Faltante</th>
                        <th onclick="sortStock(5)" style="text-align: center;" data-base-label="Factibilidad">
                            Factibilidad</th>
                        <th style="text-align: center; width:140px;" data-base-label="Accion">Accion</th>
                        <th onclick="sortStock(6)" style="text-align: center; background-color:#f0f0f0; color:#777;"
                            data-base-label="En Prod.">En Prod.</th>
                    </tr>
                </thead>
                <tbody id="body-stock"></tbody>
            </table>
        </div>
    </div>
    </div>

    <!-- CALENDAR TAB (Corrected ID) -->
    <div id="view-planificador" class="table-view" style="padding:0;">
        <div class="planner-container">
            <!-- SIDEBAR -->
            <aside id="planner-sidebar" class="planner-sidebar">
                <div class="sidebar-header" style="border-bottom:none; padding-bottom:5px;">
                    <span
                        style="font-size:1.1rem; font-weight:bold; color:var(--primary-color); display:flex; align-items:center;">
                        <span style="margin-right:10px;">⚡</span> Acciones
                    </span>
                </div>

                <!-- SIDEBAR TABS (TRIPLE VIEW) -->
                <div class="sidebar-view-tabs" style="display:flex; padding:0 10px 10px 10px; gap:4px;">
                    <button id="sb-tab-today" class="sb-tab active" onclick="setSidebarMode('today')"
                        title="Plan de Hoy"
                        style="flex:1; padding:4px; font-size:1.1rem; background:#fff; border:1px solid #ddd; border-radius:6px; cursor:pointer;">📅</button>
                    <button id="sb-tab-agenda" class="sb-tab" onclick="setSidebarMode('agenda')"
                        title="Agenda Cronológica"
                        style="flex:1; padding:4px; font-size:1.1rem; background:#fff; border:1px solid #ddd; border-radius:6px; cursor:pointer;">📋</button>
                    <button id="sb-tab-alerts" class="sb-tab" onclick="setSidebarMode('alerts')"
                        title="Notificaciones Pendientes"
                        style="flex:1; padding:4px; font-size:1.1rem; background:#fff; border:1px solid #ddd; border-radius:6px; cursor:pointer;">🔔</button>
                    <button id="sb-tab-pedidos-sin-agendar" class="sb-tab" onclick="setSidebarMode('pedidos-sin-agendar')"
                        title="Pedidos sin Agendar"
                        style="flex:1; padding:4px; font-size:1.1rem; background:#fff; border:1px solid #ddd; border-radius:6px; cursor:pointer;">📦</button>
                </div>

                <div class="sidebar-content">
                    <!-- Future drag & drop items will go here -->
                    <div style="color:#aaa; font-size:0.9em; font-style:italic; padding:10px;">
                        (Próximamente: Panel de Acciones Rápidas)
                    </div>
                </div>

                <!-- SIDEBAR FOOTER FILTER -->
                <div class="sidebar-footer-filter">
                    <label>
                        <input type="checkbox" id="hide-finished" onchange="renderCalendar()" checked>
                        Ocultar Finalizados
                    </label>
                </div>
            </aside>

            <!-- MAIN CONTENT -->
            <main class="planner-main" id="planner-main">
                <div class="card"
                    style="margin-bottom:0; height:100%; display:flex; flex-direction:column; border:none; box-shadow:none; padding: 0;">

                    <!-- ULTRA SLIM HEADER (Styles in CSS) -->
                    <div class="calendar-nav">

                        <!-- LEFT: Hamburger + Month Nav -->
                        <div style="display:flex; align-items:center; gap:20px; flex-grow: 1;">
                            <button id="sidebar-toggle" class="sidebar-toggle-btn" onclick="toggleSidebar()"
                                title="Ocultar/Mostrar Menú">
                                ☰
                            </button>

                            <!-- GOOGLE STYLE NAV -->
                            <div class="cal-nav-google" style="display:flex; align-items:center; gap:8px;">
                                <button class="nav-btn-today" onclick="goToToday()"
                                    style="border-radius:6px; padding:6px 16px; border:1px solid #dadce0; background:#fff; cursor:pointer; font-weight:500; color:#3c4043; font-size:0.95em; transition:background 0.2s;">
                                    Hoy
                                </button>
                                <div class="view-toggle-container" style="display:flex; border: 1px solid #dadce0; border-radius:6px; background:#fff; overflow:hidden;">
                                    <button id="btn-view-semanal" class="view-toggle-btn active" onclick="switchCalendarView('semanal')" style="border:none; padding:6px 12px; font-size:0.9em; font-weight:500; cursor:pointer; transition:background 0.2s;">Semanal</button>
                                    <button id="btn-view-mensual" class="view-toggle-btn" onclick="switchCalendarView('mensual')" style="border:none; border-left:1px solid #dadce0; padding:6px 12px; font-size:0.9em; font-weight:500; cursor:pointer; transition:background 0.2s;">Mensual</button>
                                </div>
                                <div class="nav-arrows" style="display:flex; gap:5px; margin-left:5px;">
                                    <button onclick="changeMonth(-1)" class="btn-icon-nav"
                                        style="border:none; background:transparent; cursor:pointer; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:#5f6368;"
                                        title="Mes Anterior">❮</button>
                                    <button onclick="changeMonth(1)" class="btn-icon-nav"
                                        style="border:none; background:transparent; cursor:pointer; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; color:#5f6368;"
                                        title="Mes Siguiente">❯</button>
                                </div>
                                <span id="cal-month-year"
                                    style="font-size: 1.3rem; font-weight:400; color:#3c4043; margin-left:10px; min-width:160px; pointer-events:none; white-space:nowrap;"></span>
                            </div>
                        </div>

                        <!-- RIGHT: CONTROLS (Search & Filters) -->
                        <div style="display:flex; align-items:center; gap:10px; position:relative;">

                            <!-- GLOBAL RESET -->
                            <button onclick="resetAllFilters()" class="btn-icon-nav" title="Limpiar Todos los Filtros"
                                style="border:none; background:transparent; cursor:pointer; font-size:1.2rem; color:#5f6368; padding:5px; border-radius:50%;">
                                ↺
                            </button>

                            <!-- SEARCH EXPANDING -->
                            <div class="header-search-container"
                                style="display:flex; align-items:center; background:#f1f3f4; border-radius:8px; padding:5px 10px; transition:all 0.3s; width:40px; position:relative;"
                                id="header-search-box">
                                <span onclick="toggleSearchFocus()"
                                    style="cursor:pointer; font-size:1.1rem; opacity:0.6;">🔍</span>
                                <input type="text" id="planner-search" onkeyup="handleSearchInput(event)"
                                    placeholder="SKU, Cliente, Pedido..."
                                    style="border:none; background:transparent; outline:none; margin-left:10px; font-size:0.95rem; width:100%; opacity:0; transition:opacity 0.2s;">
                                <span id="search-clear-btn" onclick="clearSearch()"
                                    style="cursor:pointer; font-size:0.9rem; color:#999; display:none; margin-left:5px;">✕</span>
                                <!-- RESULTS PALETTE -->
                                <div id="search-results-palette" class="search-results-palette"></div>
                            </div>

                            <!-- GROUPS DROPDOWN TRIGGER -->
                            <div style="position:relative;">
                                <button onclick="toggleGroupsDropdown()" class="btn-header-action"
                                    title="Filtrar Grupos">
                                    🗂️ Grupos ▼
                                </button>

                                <!-- DROPDOWN MENU -->
                                <div id="groups-dropdown-menu" class="dropdown-menu-custom" style="display:none;">
                                    <div
                                        style="padding:10px; border-bottom:1px solid #eee; font-weight:bold; font-size:0.85em; color:#555; display:flex; justify-content:space-between; align-items:center;">
                                        <span>SELECCIONAR GRUPOS</span>
                                        <span onclick="toggleGroupFilter('ALL')"
                                            style="cursor:pointer; color:var(--primary-color); font-size:0.9em;">(Todos)</span>
                                    </div>
                                    <div id="groups-list-container"
                                        style="max-height:600px; overflow-y:auto; padding:5px;">
                                        <!-- JS INJECTS HERE -->
                                    </div>
                                </div>
                            </div>

                        </div>

                    </div>

                    <div id="calendarContent"></div>
                </div>
        </div>


        <!-- Splash screen moved to top -->
        <!-- DEBUG FOOTER -->
        <div id="debug-footer" class="debug-footer" style="display:none;"></div>

        <!-- MANUAL ADD MODAL -->
        <!-- Context Menu -->
        <div id="context-menu" class="context-menu">
            <div class="context-menu-item" onclick="initiateManualAddFromMenu()">
                <span>🏭</span> Programar Producción
            </div>
        </div>

        <!-- Manual Add Modal -->
        <div id="manualAddModal" class="modal-overlay" style="display:none;">
            <div class="modal-content" style="max-width: 500px;">
                <div class="modal-header">
                    <h3>Programar Producción</h3>
                    <span class="modal-close" onclick="closeManualAdd()">×</span>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Fecha</label>
                        <input type="date" id="manual-date-target" disabled
                            style="background:#f1f5f9; width: 100%; border: 1px solid #ddd; padding: 8px; border-radius: 4px; margin-bottom: 10px;">
                    </div>
                    <div class="form-group">
                        <label>Hora de Producción (Opcional)</label>
                        <input type="time" id="manual-time-target"
                            style="width: 100%; border: 1px solid #ddd; padding: 8px; border-radius: 4px; margin-bottom: 10px;">
                    </div>
                    <div class="form-group">
                        <label>Minimercado / Grupo (Escriba para buscar)</label>
                        <input type="text" id="manual-group-input" list="group-list"
                            placeholder="Escriba el nombre del grupo..." onchange="manualGroupChanged()"
                            class="form-control"
                            style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom: 10px;">
                        <datalist id="group-list"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Artículo</label>
                        <select id="manual-sku" disabled
                            style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom: 10px;">
                            <option value="">-- Primero seleccione Grupo --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cantidad</label>
                        <input type="number" id="manual-qty" value="1" min="1"
                            style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom: 10px;">
                    </div>
                    <div class="form-group">
                        <label>Observaciones</label>
                        <textarea id="manual-obs" rows="3" placeholder="Opcional..."
                            style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom: 10px;"></textarea>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn-secondary" onclick="closeManualAdd()">Cancelar</button>
                    <button class="btn-produce" onclick="confirmManualAdd()">💾 Guardar Item</button>
                </div>
            </div>
        </div>

        <script src="stock_logic.js"></script>
        <script src="logica.js"></script>
</body>

</html>
